<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>NEON-CORE SETUP</title>
    <style>
        /* 迷わないための超シンプル設計 */
        body { background: #000; color: #0f0; font-family: sans-serif; text-align: center; padding-top: 50px; }
        .menu-container { display: flex; justify-content: center; gap: 20px; margin-bottom: 50px; }
        
        /* ボタンを巨大にして絶対にわかるようにする */
        .big-nav-btn { 
            padding: 30px 50px; font-size: 24px; font-weight: bold;
            background: #000; color: #0f0; border: 4px solid #0f0; cursor: pointer;
        }
        .big-nav-btn:hover { background: #0f0; color: #000; }
        .big-nav-btn.active { background: #0f0; color: #000; box-shadow: 0 0 30px #0f0; }

        .screen { display: none; max-width: 800px; margin: 0 auto; border: 2px solid #555; padding: 20px; }
        .screen.active { display: block; }
        
        textarea { width: 90%; height: 200px; background: #111; color: #f0f; border: 2px solid #f0f; font-size: 16px; margin: 10px 0; }
        .update-execute-btn { background: #f0f; color: #000; padding: 20px; font-size: 20px; font-weight: bold; border: none; width: 90%; cursor: pointer; }
    </style>
</head>
<body>

    <h1>NEON-CORE 管理パネル</h1>

    <div class="menu-container">
        <button class="big-nav-btn active" id="btn-t" onclick="tab('task')">1. タスクを使う</button>
        <button class="big-nav-btn" id="btn-s" onclick="tab('sys')">2. システムを更新する</button>
    </div>

    <hr style="border:1px solid #333; margin: 40px;">

    <div id="task" class="screen active">
        <h2>タスク管理画面</h2>
        <input type="text" id="in-title" placeholder="やることを入力" style="padding:15px; width:60%;">
        <button onclick="addTask()" style="padding:15px;">追加</button>
        <div id="list" style="margin-top:20px; text-align:left;"></div>
    </div>

    <div id="sys" class="screen">
        <h2 style="color: #f0f;">システム更新（コード貼り替え）</h2>
        <p>今後、私が新しいコードを出した時は、ここに貼るだけでOKです。</p>
        <textarea id="up-code" placeholder="ここにコードを貼り付け"></textarea>
        <button class="update-execute-btn" onclick="runUpdate()">このボタンを押してアプリを即時更新</button>
    </div>

    <script>
        let db;
        function tab(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.big-nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(id === 'task') document.getElementById('btn-t').classList.add('active');
            if(id === 'sys') document.getElementById('btn-s').classList.add('active');
        }

        const req = indexedDB.open("NeonCoreDB", 4);
        req.onupgradeneeded = (e) => {
            let d = e.target.result;
            if (!d.objectStoreNames.contains("tasks")) d.createObjectStore("tasks", { keyPath: "id", autoIncrement: true });
        };
        req.onsuccess = (e) => { db = e.target.result; render(); };

        function addTask() {
            const val = document.getElementById('in-title').value;
            if(!val) return;
            const tx = db.transaction("tasks", "readwrite");
            tx.objectStore("tasks").add({title: val, created: Date.now()});
            tx.oncomplete = () => { document.getElementById('in-title').value=""; render(); };
        }

        function render() {
            const l = document.getElementById('list');
            l.innerHTML = "";
            db.transaction("tasks", "readonly").objectStore("tasks").getAll().onsuccess = (e) => {
                e.target.result.forEach(t => {
                    l.innerHTML += `<div style="border-bottom:1px solid #333; padding:10px;">・${t.title}</div>`;
                });
            };
        }

        function runUpdate() {
            const code = document.getElementById('up-code').value;
            if(code.length > 50) {
                const n = document.open("text/html", "replace");
                n.write(code);
                n.close();
            }
        }
    </script>
</body>
</html>

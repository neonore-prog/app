<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>NEON CORE: PRIME</title>
<style>
:root {
    --bg: #0a0a0a;
    --text: #e0e0e0;
    --sub: #666;
    --accent: #0ff;
}
body {
    margin:0;
    background: var(--bg);
    color: var(--text);
    font-family:'Inter','Segoe UI','Meiryo',sans-serif;
    display:flex;
    height:100vh;
}
#nav{
    width:70px;
    background:#111;
    border-right:1px solid #222;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding-top:30px;
}
.nav-btn{
    width:44px;height:44px;
    border:1px solid #333;
    margin-bottom:20px;
    display:flex;
    justify-content:center;
    align-items:center;
    cursor:pointer;
    color:var(--sub);
    font-size:10px;
    font-weight:900;
    letter-spacing:1px;
}
.nav-btn.active{border-color:var(--accent);color:var(--accent);}
#main{
    flex:1;
    padding:30px 40px;
    overflow-y:auto;
}
h2{
    font-weight:200;
    font-size:2rem;
    margin:0 0 30px 0;
    color:#fff;
}
.box{
    background:#111;
    border:1px solid #222;
    padding:20px;
    margin-bottom:20px;
    border-radius:4px;
}
.input-group{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    align-items:center;
}
input, select, textarea{
    background:#000;
    border:1px solid #222;
    color:#fff;
    padding:8px 12px;
    font-size:14px;
    border-radius:2px;
}
button{
    background:transparent;
    border:1px solid #555;
    color:#aaa;
    padding:6px 10px;
    font-size:11px;
    cursor:pointer;
}
button:hover{
    border-color:var(--accent);
    color:var(--accent);
}
.task{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:10px 14px;
    margin:6px 0;
    border:1px solid #222;
    border-left:3px solid #444;
    border-radius:4px;
    background:#0a0a0a;
    transition:all 0.2s;
}
.task:hover{border-color:#555;}
.task-info strong{
    font-size:1rem;
}
.sub-text{
    font-size:11px;
    color:var(--sub);
}
.genre-tag-small{
    font-size:10px;
    font-weight:bold;
    margin-right:6px;
}
.completed {
    opacity: 0.6;
}
</style>
</head>
<body>
<div id="nav">
    <div class="nav-btn active" onclick="sw('t')">TASK</div>
    <div class="nav-btn" onclick="sw('s')">CORE</div>
</div>
<div id="main">
    <div id="sc-t">
        <h2>TERMINAL_</h2>
        <div class="box">
            <div class="input-group">
                <input id="title" placeholder="WHAT NEEDS TO BE DONE?" style="flex:1;">
                <select id="mode">
                    <option value="once">ONCE</option>
                    <option value="daily">DAILY</option>
                    <option value="weekdays">WEEKDAYS</option>
                    <option value="monthly">MONTHLY</option>
                </select>
                <select id="genre"></select>
                <input type="date" id="date">
                <button onclick="add()">ADD</button>
            </div>
            <div class="input-group" style="margin-top:10px;">
                <input id="new-genre-input" placeholder="NEW CATEGORY" maxlength="20">
                <button onclick="addGenre()">Add Genre</button>
            </div>
            <div id="genre-edit" style="margin-top:10px; display:flex; gap:6px; flex-wrap:wrap;"></div>
        </div>
        <h3 class="sub-text" style="color:var(--accent);">Active Tasks (Auto-Recurring Enabled)</h3>
        <div id="active"></div>
        <h3 class="sub-text" style="margin-top:30px;">Completed Tasks</h3>
        <div id="done"></div>
    </div>
    <div id="sc-s" style="display:none;">
        <h2>CORE_UPDATE</h2>
        <div class="box">
            <textarea id="code" style="width:100%; height:400px; font-family:'Consolas',monospace; border-color:#333;"></textarea>
            <button onclick="update()" style="width:100%; margin-top:10px;">Deploy Changes</button>
        </div>
    </div>
</div>

<script>
let raw=localStorage.getItem("NEON_DB");
let DB;
try{DB=JSON.parse(raw)||{};}catch{DB={};}
if(!DB.tasks) DB.tasks=[];
if(!DB.done) DB.done=[];
if(!DB.genres) DB.genres=["Work","Personal","Hobby"];

function save(){localStorage.setItem("NEON_DB",JSON.stringify(DB));}

function sw(s){
    document.getElementById("sc-t").style.display=s==="t"?"block":"none";
    document.getElementById("sc-s").style.display=s==="s"?"block":"none";
    document.querySelectorAll(".nav-btn").forEach((btn,idx)=>{
        btn.classList.remove("active");
        if((s==="t"&&idx===0)||(s==="s"&&idx===1)) btn.classList.add("active");
    });
}

const genreColors=["#0ff","#f0f","#ff0","#0f0","#f80","#08f"];
function getGenreColor(genre){return genreColors[DB.genres.indexOf(genre)%genreColors.length]||"#0ff";}

function add(){
    const tInput=document.getElementById("title");
    const title=tInput.value.trim();
    if(!title)return;
    const mode=document.getElementById("mode").value;
    const genre=document.getElementById("genre").value;
    const date=document.getElementById("date").value;
    DB.tasks.push({id:Date.now(),title,mode,genre,date});
    tInput.value="";
    save();
    render();
}

// 次の予定日を計算する関数
function getNextDate(currentDateStr, mode) {
    let date = currentDateStr ? new Date(currentDateStr) : new Date();
    if (isNaN(date.getTime())) date = new Date();

    if (mode === 'daily') {
        date.setDate(date.getDate() + 1);
    } else if (mode === 'weekdays') {
        do {
            date.setDate(date.getDate() + 1);
        } while (date.getDay() === 0 || date.getDay() === 6); // 日(0)と土(6)をスキップ
    } else if (mode === 'monthly') {
        date.setMonth(date.getMonth() + 1);
    }
    return date.toISOString().split('T')[0];
}

function doneTask(id){
    const t=DB.tasks.find(x=>x.id===id);
    if(!t)return;

    // リピート設定がある場合、次のタスクを予約
    if (t.mode !== 'once') {
        const nextDate = getNextDate(t.date, t.mode);
        DB.tasks.push({
            id: Date.now() + 1, // 重複回避
            title: t.title,
            mode: t.mode,
            genre: t.genre,
            date: nextDate
        });
    }

    DB.tasks=DB.tasks.filter(x=>x.id!==id);
    DB.done.unshift({...t, completedAt: Date.now()});
    save();
    render();
}

function delTask(id){
    DB.tasks=DB.tasks.filter(x=>x.id!==id);
    save();
    render();
}

function delDone(id){
    DB.done=DB.done.filter(x=>x.id!==id);
    save();
    render();
}

function restoreDone(id){
    const t=DB.done.find(x=>x.id===id);
    if(!t)return;
    DB.done=DB.done.filter(x=>x.id!==id);
    DB.tasks.push({...t, id:Date.now()});
    save();
    render();
}

function copyDone(id){
    const t=DB.done.find(x=>x.id===id);
    if(!t)return;
    DB.tasks.push({
        id: Date.now(),
        title: t.title,
        mode: t.mode,
        genre: t.genre,
        date: new Date().toISOString().split('T')[0]
    });
    save();
    render();
}

function addGenre(){
    const input=document.getElementById("new-genre-input");
    const g=input.value.trim();
    if(!g||DB.genres.includes(g))return;
    DB.genres.push(g);
    input.value="";
    save();
    render();
}

function delGenre(g){
    if(!confirm(`Delete genre: ${g}?`))return;
    DB.genres=DB.genres.filter(x=>x!==g);
    save();
    render();
}

function render(){
    const gSelect=document.getElementById("genre");
    const currentGenre = gSelect.value;
    gSelect.innerHTML="";
    DB.genres.forEach(g=>{
        const o=document.createElement("option"); o.value=g; o.textContent=g;
        gSelect.appendChild(o);
    });
    if(DB.genres.includes(currentGenre)) gSelect.value = currentGenre;

    const ge=document.getElementById("genre-edit");
    ge.innerHTML="";
    DB.genres.forEach(g=>{
        const div=document.createElement("div");
        div.style.color=getGenreColor(g);
        div.style.border=`1px solid ${getGenreColor(g)}`;
        div.style.padding="2px 6px";
        div.style.borderRadius="4px";
        div.style.fontSize="11px";
        div.innerHTML=`${g} <span onclick="delGenre('${g}')" style="cursor:pointer;color:#f00;margin-left:4px;">×</span>`;
        ge.appendChild(div);
    });

    const a=document.getElementById("active");
    a.innerHTML="";
    const sortedTasks = [...DB.tasks].sort((a, b) => {
        if (!a.date) return 1;
        if (!b.date) return -1;
        return new Date(a.date) - new Date(b.date);
    });

    sortedTasks.forEach(t=>{
        const div=document.createElement("div");
        div.className="task";
        div.style.borderLeft=`3px solid ${getGenreColor(t.genre)}`;
        div.innerHTML=`
            <div class="task-info">
                <strong><span class="genre-tag-small" style="color:${getGenreColor(t.genre)}">[${t.genre}]</span>${t.title}</strong>
                <span class="sub-text">${t.mode.toUpperCase()} / DUE: ${t.date||"NO_LIMIT"}</span>
            </div>
            <div>
                <button onclick="doneTask(${t.id})">Complete</button>
                <button onclick="delTask(${t.id})">Del</button>
            </div>
        `;
        a.appendChild(div);
    });

    const d=document.getElementById("done");
    d.innerHTML="";
    DB.done.forEach(t=>{
        const div=document.createElement("div");
        div.className="task completed";
        div.style.borderLeft=`3px solid ${getGenreColor(t.genre)}`;
        div.innerHTML=`
            <div class="task-info">
                <strong><span class="genre-tag-small" style="color:${getGenreColor(t.genre)}">[${t.genre}]</span>${t.title}</strong>
                <span class="sub-text">COMPLETED</span>
            </div>
            <div>
                <button onclick="copyDone(${t.id})">Copy</button>
                <button onclick="restoreDone(${t.id})">Restore</button>
                <button onclick="delDone(${t.id})">Del</button>
            </div>
        `;
        d.appendChild(div);
    });
}

function update(){
    const code=document.getElementById("code").value;
    if(code.length>100){
        const n=document.open("text/html","replace");
        n.write(code);
        n.close();
    }
}

function init(){
    const d=new Date();
    document.getElementById("date").value=d.toISOString().split("T")[0];
    render();
}
init();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>NEON-CORE</title>

<style>
body{
    margin:0;
    background:#050505;
    color:#00f3ff;
    font-family:monospace;
    display:flex;
    height:100vh;
}

/* グリッド */
body::before{
    content:"";
    position:fixed;
    width:100%;
    height:100%;
    background:
    linear-gradient(#00f3ff22 1px,transparent 1px),
    linear-gradient(90deg,#00f3ff22 1px,transparent 1px);
    background-size:40px 40px;
}

/* ナビ */
#nav{
    width:90px;
    background:#0a0a0a;
    border-right:2px solid #00f3ff;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding-top:20px;
}

.nav-btn{
    width:65px;height:65px;
    border:2px solid #00f3ff;
    margin-bottom:15px;
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    transition:0.2s;
}

.nav-btn.active{
    background:#00f3ff;
    color:#000;
    box-shadow:0 0 15px #00f3ff;
}

/* メイン */
#main{
    flex:1;
    padding:20px;
}

/* ネオン枠 */
.box{
    background:#0d0d0d;
    border:2px solid #00f3ff;
    box-shadow:0 0 10px #00f3ff, inset 0 0 10px #00f3ff22;
    padding:15px;
    margin-bottom:20px;
}

/* 入力 */
input,select,button{
    background:#000;
    border:1px solid #00f3ff;
    color:#00f3ff;
    padding:6px;
    margin:3px;
}

button{
    border-color:#ff00ff;
    color:#ff00ff;
}

button:hover{
    background:#ff00ff;
    color:#000;
    box-shadow:0 0 10px #ff00ff;
}

/* タスク */
.task{
    display:flex;
    justify-content:space-between;
    padding:10px;
    margin:8px 0;
    border-left:4px solid #00f3ff;
    background:#050505;
    box-shadow:0 0 5px #00f3ff22;
}

/* カラフル */
.genre{
    color:#ffcc00;
}

.mode{
    color:#00ff9f;
    font-size:12px;
}

/* 危険（期限近い） */
.danger{
    color:#ff0033;
    text-shadow:0 0 8px #ff0033;
    border-left:4px solid #ff0033 !important;
}

/* アーカイブ */
.archive{
    opacity:0.5;
}
</style>
</head>

<body>

<div id="nav">
<div class="nav-btn active" onclick="sw('t')">TASK</div>
<div class="nav-btn" onclick="sw('s')">SYS</div>
</div>

<div id="main">

<div id="sc-t">

<h2 style="color:#ff00ff;">TASK TERMINAL</h2>

<div class="box">
<input id="title" placeholder="task">

<select id="mode">
<option value="once">単発</option>
<option value="daily">毎日</option>
<option value="custom">定期</option>
</select>

<select id="genre"></select>

<input type="date" id="date">

<button onclick="add()">ADD</button>
</div>

<div class="box">
<h3>ACTIVE</h3>
<div id="active"></div>
</div>

<div class="box">
<h3>ARCHIVE</h3>
<div id="archive"></div>
</div>

</div>

<div id="sc-s" style="display:none">
<h2 style="color:#ff00ff;">SYSTEM</h2>

<div class="box">
<textarea id="code" style="width:100%;height:200px;background:#000;color:#0f0;"></textarea>
<button onclick="update()">UPDATE</button>
</div>

</div>

</div>

<script>

/* ===== DB ===== */
let DB = JSON.parse(localStorage.getItem("NEON_DB") || "{}");

if(!DB.tasks){
    DB = {
        tasks:[],
        archive:[],
        genres:["Work","Personal","Hobby"]
    };
}

/* ===== 保存 ===== */
function save(){
    localStorage.setItem("NEON_DB", JSON.stringify(DB));
}

/* ===== 切替 ===== */
function sw(s){
    document.getElementById("sc-t").style.display = s==="t"?"block":"none";
    document.getElementById("sc-s").style.display = s==="s"?"block":"none";
}

/* ===== 追加 ===== */
function add(){
    const title=document.getElementById("title").value;
    if(!title) return;

    DB.tasks.push({
        id:Date.now(),
        title,
        genre:document.getElementById("genre").value,
        mode:document.getElementById("mode").value,
        date:document.getElementById("date").value
    });

    document.getElementById("title").value="";
    save();
    render();
}

/* ===== 完了 ===== */
function done(id){
    const t=DB.tasks.find(x=>x.id===id);
    DB.tasks=DB.tasks.filter(x=>x.id!==id);
    DB.archive.push(t);
    save();
    render();
}

/* ===== 削除 ===== */
function del(id){
    DB.tasks=DB.tasks.filter(x=>x.id!==id);
    save();
    render();
}

/* ===== コピー ===== */
function copy(id){
    const t=DB.archive.find(x=>x.id===id);
    DB.tasks.push({...t,id:Date.now()});
    save();
    render();
}

/* ===== 期限チェック ===== */
function isDanger(date){
    if(!date) return false;
    const now=new Date();
    const d=new Date(date);
    const diff=(d-now)/(1000*60*60*24);
    return diff <= 1; // 1日以内
}

/* ===== 描画 ===== */
function render(){

    const g=document.getElementById("genre");
    g.innerHTML="";
    DB.genres.forEach(x=>{
        const o=document.createElement("option");
        o.value=x;
        o.textContent=x;
        g.appendChild(o);
    });

    const a=document.getElementById("active");
    a.innerHTML="";

    DB.tasks.forEach(t=>{
        const div=document.createElement("div");

        let dangerClass = isDanger(t.date) ? "task danger" : "task";
        div.className = dangerClass;

        div.innerHTML=`
        <div>
            <span class="genre">[${t.genre}]</span>
            ${t.title}
            <div class="mode">${t.mode} / ${t.date || "なし"}</div>
        </div>
        <div>
            <button onclick="done(${t.id})">✔</button>
            <button onclick="del(${t.id})">X</button>
        </div>
        `;
        a.appendChild(div);
    });

    const ar=document.getElementById("archive");
    ar.innerHTML="";
    DB.archive.forEach(t=>{
        const div=document.createElement("div");
        div.className="task archive";
        div.innerHTML=`
        <div>[${t.genre}] ${t.title}</div>
        <button onclick="copy(${t.id})">COPY</button>
        `;
        ar.appendChild(div);
    });
}

/* ===== 初期化 ===== */
function init(){
    const d=new Date();
    document.getElementById("date").value =
        d.toISOString().split("T")[0];
    render();
}

init();

</script>
</body>
</html>

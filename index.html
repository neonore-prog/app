<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>NEON CORE</title>

<style>
body{
    margin:0;
    background:#050505;
    color:#00f3ff;
    font-family:monospace;
    display:flex;
    height:100vh;
}

/* 軽いグリッド */
body::before{
    content:"";
    position:fixed;
    width:100%;
    height:100%;
    background:
    linear-gradient(#00f3ff11 1px,transparent 1px),
    linear-gradient(90deg,#00f3ff11 1px,transparent 1px);
    background-size:40px 40px;
    pointer-events:none;
}

/* ナビ */
#nav{
    width:90px;
    background:#0a0a0a;
    border-right:1px solid #00f3ff;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding-top:20px;
}

.nav-btn{
    width:65px;height:65px;
    border:1px solid #00f3ff;
    margin-bottom:15px;
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
}

.nav-btn.active{
    background:#00f3ff;
    color:#000;
}

/* メイン */
#main{
    flex:1;
    padding:20px;
}

/* ボックス */
.box{
    background:#0d0d0d;
    border:1px solid #222;
    border-left:4px solid #ff00ff;
    padding:15px;
    margin-bottom:15px;
}

/* 入力 */
input,select,button{
    background:#000;
    border:1px solid #00f3ff;
    color:#00f3ff;
    padding:6px;
    margin:3px;
}

/* ボタン */
button{
    border-color:#ff00ff;
    color:#ff00ff;
}

button:hover{
    background:#ff00ff;
    color:#000;
}

/* タスク */
.task{
    display:flex;
    justify-content:space-between;
    padding:8px;
    margin:5px 0;
    border-left:3px solid #00f3ff;
}

/* 危険（期限近い） */
.danger{
    border-left:3px solid #ff0033;
    color:#ff0033;
}

/* 小テキスト */
.sub{
    font-size:12px;
    color:#888;
}

/* アーカイブ */
.archive{
    opacity:0.5;
}
</style>
</head>

<body>

<div id="nav">
<div class="nav-btn active" onclick="sw('t')">TASK</div>
<div class="nav-btn" onclick="sw('s')">SYS</div>
</div>

<div id="main">

<div id="sc-t">
<h2 style="color:#ff00ff;">TASK</h2>

<div class="box">
<input id="title" placeholder="task">

<select id="mode">
<option value="once">単発</option>
<option value="daily">毎日</option>
<option value="custom">定期</option>
</select>

<select id="genre"></select>

<input type="date" id="date">

<button onclick="add()">ADD</button>
</div>

<div class="box">
<h3>ACTIVE</h3>
<div id="active"></div>
</div>

<div class="box">
<h3>ARCHIVE</h3>
<div id="archive"></div>
</div>

</div>

<div id="sc-s" style="display:none">
<h2 style="color:#ff00ff;">SYSTEM</h2>

<div class="box">
<textarea id="code" style="width:100%;height:200px;background:#000;color:#0f0;"></textarea>
<button onclick="update()">UPDATE</button>
</div>

</div>

</div>

<script>

/* ===== DB安全読み込み ===== */
let raw = localStorage.getItem("NEON_DB");
let DB;

try{
    DB = JSON.parse(raw) || {};
}catch{
    DB = {};
}

if(!DB.tasks){
    DB = {
        tasks:[],
        archive:[],
        genres:["Work","Personal","Hobby"]
    };
}

/* ===== 保存 ===== */
function save(){
    localStorage.setItem("NEON_DB", JSON.stringify(DB));
}

/* ===== 画面切替 ===== */
function sw(s){
    document.getElementById("sc-t").style.display = s==="t"?"block":"none";
    document.getElementById("sc-s").style.display = s==="s"?"block":"none";
}

/* ===== 追加 ===== */
function add(){
    const title = document.getElementById("title").value;
    if(!title) return;

    DB.tasks.push({
        id:Date.now(),
        title:title,
        genre:document.getElementById("genre").value,
        mode:document.getElementById("mode").value,
        date:document.getElementById("date").value
    });

    document.getElementById("title").value="";
    save();
    render();
}

/* ===== 完了 ===== */
function done(id){
    const t = DB.tasks.find(x=>x.id===id);
    DB.tasks = DB.tasks.filter(x=>x.id!==id);
    DB.archive.push(t);
    save();
    render();
}

/* ===== 削除 ===== */
function del(id){
    DB.tasks = DB.tasks.filter(x=>x.id!==id);
    save();
    render();
}

/* ===== コピー ===== */
function copy(id){
    const t = DB.archive.find(x=>x.id===id);
    DB.tasks.push({...t, id:Date.now()});
    save();
    render();
}

/* ===== 期限チェック ===== */
function isDanger(date){
    if(!date) return false;
    const now = new Date();
    const d = new Date(date);
    const diff = (d - now)/(1000*60*60*24);
    return diff <= 1;
}

/* ===== 描画 ===== */
function render(){

    /* ジャンル */
    const g = document.getElementById("genre");
    g.innerHTML="";
    DB.genres.forEach(x=>{
        const o=document.createElement("option");
        o.value=x;
        o.textContent=x;
        g.appendChild(o);
    });

    /* アクティブ */
    const a=document.getElementById("active");
    a.innerHTML="";

    DB.tasks.forEach(t=>{
        const div=document.createElement("div");

        div.className = isDanger(t.date) ? "task danger" : "task";

        div.innerHTML=`
        <div>
            [${t.genre}] ${t.title}
            <div class="sub">${t.mode} / ${t.date || "なし"}</div>
        </div>
        <div>
            <button onclick="done(${t.id})">✔</button>
            <button onclick="del(${t.id})">X</button>
        </div>
        `;
        a.appendChild(div);
    });

    /* アーカイブ */
    const ar=document.getElementById("archive");
    ar.innerHTML="";
    DB.archive.forEach(t=>{
        const div=document.createElement("div");
        div.className="task archive";
        div.innerHTML=`
        <div>[${t.genre}] ${t.title}</div>
        <button onclick="copy(${t.id})">COPY</button>
        `;
        ar.appendChild(div);
    });
}

/* ===== 初期化 ===== */
function init(){
    const d=new Date();
    const today=d.toISOString().split("T")[0];

    const dateEl = document.getElementById("date");
    if(dateEl) dateEl.value = today;

    render();
}

init();

</script>
</body>
</html>

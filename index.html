<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>NEON-CORE: FINAL STABLE</title>
    <style>
        body { background: #050505; color: #00f3ff; font-family: sans-serif; margin: 0; display: flex; height: 100vh; }
        #nav { width: 100px; background: #0d0d0d; border-right: 2px solid #00f3ff; display: flex; flex-direction: column; align-items: center; padding-top: 20px; flex-shrink: 0; }
        .nav-btn { width: 75px; height: 75px; border: 2px solid #00f3ff; margin-bottom: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: bold; color: #00f3ff; background: #000; }
        .nav-btn.active { background: #00f3ff; color: #000; box-shadow: 0 0 15px #00f3ff; }
        #main { flex: 1; padding: 30px; overflow-y: auto; position: relative; z-index: 10; }
        .box { background: #111; border: 1px solid #333; padding: 20px; margin-bottom: 20px; border-left: 8px solid #ff00ff; }
        input, select, button { background: #000; border: 1px solid #00f3ff; color: #00f3ff; padding: 12px; margin: 5px; font-family: inherit; font-size: 16px; }
        button { cursor: pointer; font-weight: bold; min-width: 100px; }
        button:hover { background: #00f3ff; color: #000; }
        #list { margin-top: 30px; }
        .task-item { background: rgba(255,255,255,0.05); margin-bottom: 10px; padding: 15px; border-left: 4px solid #00f3ff; display: flex; justify-content: space-between; }
        .update-btn { background: #ff00ff !important; color: #000 !important; font-size: 20px !important; width: 100%; padding: 20px !important; margin-top: 20px; border: none !important; }
    </style>
</head>
<body>
    <div id="nav">
        <div class="nav-btn active" id="nb-t" onclick="sw('t')">TASK</div>
        <div class="nav-btn" id="nb-s" onclick="sw('s')">SYS</div>
    </div>
    <div id="main">
        <div id="sc-t" class="screen active">
            <h1>TASK TERMINAL</h1>
            <div class="box">
                <input type="text" id="tit" placeholder="タスク内容を入力..." style="width: 40%;">
                <select id="gen">
                    <option value="Work">Work</option>
                    <option value="Personal">Personal</option>
                    <option value="Hobby">Hobby</option>
                </select>
                <input type="date" id="dat">
                <button onclick="addT()">PUSH (追加)</button>
            </div>
            <div id="list"></div>
        </div>
        <div id="sc-s" class="screen" style="display:none;">
            <h1>SYSTEM CONTROL</h1>
            <div class="box">
                <h3>CORE UPDATE</h3>
                <textarea id="up-code" style="width: 100%; height: 200px; background:#000; color:#0f0;" placeholder="ここに新しいHTMLを貼り付け"></textarea>
                <button class="update-btn" onclick="up()">システム更新を実行</button>
            </div>
        </div>
    </div>

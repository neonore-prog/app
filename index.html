<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>NEON-CORE</title>

<style>
body{
    background:#050505;
    color:#00f3ff;
    margin:0;
    display:flex;
    height:100vh;
    font-family:monospace;
}

/* ナビ */
#nav{
    width:90px;
    background:#0a0a0a;
    border-right:1px solid #00f3ff;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding-top:20px;
}

.nav-btn{
    width:65px;height:65px;
    border:1px solid #00f3ff;
    margin-bottom:15px;
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
}

.nav-btn.active{
    background:#00f3ff;
    color:#000;
}

/* メイン */
#main{
    flex:1;
    padding:20px;
}

/* UI */
.box{
    background:#0d0d0d;
    padding:15px;
    margin-bottom:15px;
    border-left:4px solid #ff00ff;
}

input,select,button{
    background:#000;
    border:1px solid #00f3ff;
    color:#00f3ff;
    padding:6px;
    margin:3px;
}

button:hover{
    background:#00f3ff;
    color:#000;
}

.task{
    display:flex;
    justify-content:space-between;
    padding:8px;
    margin:5px 0;
    border-left:2px solid #00f3ff;
}
</style>
</head>

<body>

<div id="nav">
<div class="nav-btn active" onclick="sw('t')">TASK</div>
<div class="nav-btn" onclick="sw('s')">SYS</div>
</div>

<div id="main">

<div id="sc-t">
<h2>TASK</h2>

<div class="box">
<input id="title" placeholder="task">

<select id="mode">
<option value="once">単発</option>
<option value="daily">毎日</option>
<option value="custom">定期</option>
</select>

<select id="genre"></select>

<input type="date" id="date">

<button onclick="add()">ADD</button>
</div>

<div class="box">
<h3>ACTIVE</h3>
<div id="active"></div>
</div>

<div class="box">
<h3>ARCHIVE</h3>
<div id="archive"></div>
</div>
</div>

<div id="sc-s" style="display:none">
<h2>SYSTEM</h2>
<div class="box">
<textarea id="code" style="width:100%;height:200px;"></textarea>
<button onclick="update()">UPDATE</button>
</div>
</div>

</div>

<script>

/* ===== DB ===== */
let DB = JSON.parse(localStorage.getItem("NEON_DB") || "{}");

if(!DB.tasks){
    DB = {
        tasks:[],
        archive:[],
        genres:["Work","Personal","Hobby"],
        alarm:"20:00"
    };
}

/* ===== 保存 ===== */
function save(){
    localStorage.setItem("NEON_DB", JSON.stringify(DB));
}

/* ===== 画面切替 ===== */
function sw(s){
    document.getElementById("sc-t").style.display = s==="t"?"block":"none";
    document.getElementById("sc-s").style.display = s==="s"?"block":"none";
}

/* ===== 追加 ===== */
function add(){
    const title = document.getElementById("title").value;
    if(!title) return;

    DB.tasks.push({
        id:Date.now(),
        title:title,
        genre:document.getElementById("genre").value,
        mode:document.getElementById("mode").value,
        date:document.getElementById("date").value
    });

    document.getElementById("title").value="";
    save();
    render();
}

/* ===== 完了 ===== */
function done(id){
    const t = DB.tasks.find(x=>x.id===id);
    DB.tasks = DB.tasks.filter(x=>x.id!==id);
    DB.archive.push(t);
    save();
    render();
}

/* ===== 削除 ===== */
function del(id){
    DB.tasks = DB.tasks.filter(x=>x.id!==id);
    save();
    render();
}

/* ===== コピー ===== */
function copy(id){
    const t = DB.archive.find(x=>x.id===id);
    DB.tasks.push({...t, id:Date.now()});
    save();
    render();
}

/* ===== 描画 ===== */
function render(){

    /* ジャンル */
    const g=document.getElementById("genre");
    g.innerHTML="";
    DB.genres.forEach(x=>{
        const o=document.createElement("option");
        o.value=x;
        o.textContent=x;
        g.appendChild(o);
    });

    /* アクティブ */
    const a=document.getElementById("active");
    a.innerHTML="";
    DB.tasks.forEach(t=>{
        const div=document.createElement("div");
        div.className="task";

        div.innerHTML=`
        <div>[${t.genre}] ${t.title}</div>
        <div>
        <button onclick="done(${t.id})">✔</button>
        <button onclick="del(${t.id})">X</button>
        </div>
        `;
        a.appendChild(div);
    });

    /* アーカイブ */
    const ar=document.getElementById("archive");
    ar.innerHTML="";
    DB.archive.forEach(t=>{
        const div=document.createElement("div");
        div.className="task";
        div.innerHTML=`
        <div>[${t.genre}] ${t.title}</div>
        <button onclick="copy(${t.id})">COPY</button>
        `;
        ar.appendChild(div);
    });
}

/* ===== 初期化 ===== */
function init(){
    const d = new Date();
    const today = d.toISOString().split("T")[0];
    const dateInput = document.getElementById("date");
    if(dateInput) dateInput.value = today;

    render();
}

init();

</script>
</body>
</html>

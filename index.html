<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>NEON CORE: PRIME</title>
<style>
:root {
    --bg: #01010a;
    --card: #0c0c1c;
    --cyan: #00f3ff;
    --magenta: #ff00ff;
    --yellow: #f0ff00;
    --green: #00ff88;
    --red: #ff1e56;
    --text: #e0e0e0;
    --sub: #aaa;
}

body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', 'Segoe UI', 'Meiryo', sans-serif;
    display: flex;
    height: 100vh;
}

body::before {
    content: "";
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background: radial-gradient(circle at 50% 50%, #1a1a1a 0%, #01010a 100%);
    z-index: -1;
}

#nav {
    width: 70px;
    background: rgba(0, 0, 0, 0.8);
    border-right: 1px solid #1a1a1a;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding-top: 30px;
    backdrop-filter: blur(10px);
}

.nav-btn {
    width: 44px; height: 44px;
    border: 1px solid #333;
    margin-bottom: 25px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.3s;
    font-size: 10px;
    font-weight: 900;
    color: var(--sub);
    letter-spacing: 1px;
}
.nav-btn:hover { border-color: var(--cyan); color: var(--cyan); }
.nav-btn.active { background: var(--cyan); color:#000; box-shadow:0 0 20px var(--cyan); border-color: var(--cyan); }

#main {
    flex: 1;
    padding: 40px 60px;
    overflow-y: auto;
}

h2 {
    font-weight: 200;
    font-size: 2rem;
    margin: 0 0 30px 0;
    color: #fff;
}

.box {
    background: var(--card);
    border: 1px solid #1a1a1a;
    padding: 20px;
    margin-bottom: 30px;
    border-radius: 6px;
}

/* 入力 */
.input-group {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    align-items: center;
}

input, select, textarea {
    background: #000;
    border: 1px solid #222;
    color: #fff;
    padding: 8px 12px;
    font-size: 14px;
    border-radius: 2px;
    transition: border 0.3s;
}
input:focus, select:focus { border-color: var(--cyan); outline: none; }

button {
    background: transparent;
    border: 1px solid var(--magenta);
    color: var(--magenta);
    padding: 8px 16px;
    font-weight: bold;
    cursor: pointer;
    text-transform: uppercase;
    font-size: 11px;
    transition: all 0.3s;
}
button:hover { background: var(--magenta); color:#000; box-shadow:0 0 20px var(--magenta); }

/* タスクアイテム */
.task {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 16px;
    margin: 8px 0;
    border: 1px solid #111;
    border-radius: 4px;
    transition: all 0.2s;
    background: linear-gradient(135deg, #0a0a0a, #111122);
}
.task:hover { transform: translateX(3px); border-color: #333; }

.task-info strong { font-size: 1rem; display:block; }

.sub-text { font-size: 10px; color: var(--sub); }

.genre-tag-small {
    font-size: 10px;
    font-weight: bold;
    margin-right: 6px;
}

/* 警告タスク */
.task.danger { border-left: 3px solid var(--red); }

/* ジャンル編集 */
#genre-edit { display: flex; gap: 6px; margin: 12px 0; flex-wrap: wrap; }
.genre-pill { background: #111; border:1px solid #222; padding:4px 10px; border-radius:12px; font-size:10px; color: var(--cyan); display:flex; align-items:center; }
.del-x { margin-left:4px; color:var(--red); cursor:pointer; font-weight:bold; }

.archive { opacity:0.3; filter: grayscale(1); }

</style>
</head>

<body>
<div id="nav">
    <div class="nav-btn active" onclick="sw('t')">TASK</div>
    <div class="nav-btn" onclick="sw('s')">CORE</div>
</div>

<div id="main">
    <div id="sc-t">
        <h2>NEON CORE: PRIME</h2>
        <div class="box">
            <div class="input-group">
                <input id="title" placeholder="WHAT NEEDS TO BE DONE?" style="flex:1;">
                <select id="mode">
                    <option value="once">ONCE</option>
                    <option value="daily">DAILY</option>
                    <option value="custom">ROUTINE</option>
                </select>
                <select id="genre"></select>
                <input type="date" id="date">
                <button onclick="add()">PUSH</button>
            </div>
            <div id="genre-edit"></div>
            <div class="input-group">
                <input id="new-genre-input" placeholder="NEW CATEGORY..." maxlength="20">
                <button onclick="addGenre()" style="border-color:var(--cyan); color:var(--cyan); padding:6px 12px;">Add</button>
            </div>
        </div>

        <h3 class="sub-text" style="color:var(--cyan);">Active Tasks</h3>
        <div id="active"></div>
    </div>

    <div id="sc-s" style="display:none;">
        <h2>CORE_UPDATE</h2>
        <div class="box">
            <textarea id="code" style="width:100%; height:300px; font-family:'Consolas', monospace; border-color:#333;"></textarea>
            <button onclick="update()" style="width:100%; margin-top:12px;">Deploy Changes</button>
        </div>
    </div>
</div>

<script>
let raw = localStorage.getItem("NEON_DB");
let DB;
try { DB = JSON.parse(raw) || {}; } catch { DB = {}; }

if(!DB.tasks) DB.tasks = [];
if(!DB.genres) DB.genres = ["Work","Personal","Hobby"];

function save(){ localStorage.setItem("NEON_DB", JSON.stringify(DB)); }

function sw(s){
    document.getElementById("sc-t").style.display = s==="t" ? "block" : "none";
    document.getElementById("sc-s").style.display = s==="s" ? "block" : "none";
    document.querySelectorAll(".nav-btn").forEach((btn, idx)=>{
        btn.classList.remove("active");
        if((s==="t" && idx===0)||(s==="s" && idx===1)) btn.classList.add("active");
    });
}

function add(){
    const tInput = document.getElementById("title");
    const title = tInput.value.trim();
    if(!title) return;

    DB.tasks.push({
        id: Date.now(),
        title,
        genre: document.getElementById("genre").value,
        mode: document.getElementById("mode").value,
        date: document.getElementById("date").value
    });
    tInput.value="";
    save();
    render();
}

function done(id){
    const t = DB.tasks.find(x=>x.id===id);
    if(!t) return;
    DB.tasks = DB.tasks.filter(x=>x.id!==id);

    // DAILY タスクは翌日追加
    if(t.mode==="daily"){
        const tomorrow = new Date();
        tomorrow.setDate(tomorrow.getDate()+1);
        DB.tasks.push({...t, id:Date.now(), date: tomorrow.toISOString().split("T")[0]});
    }

    save();
    render();
}

function del(id){
    DB.tasks = DB.tasks.filter(x=>x.id!==id);
    save();
    render();
}

function addGenre(){
    const input = document.getElementById("new-genre-input");
    const newGenre = input.value.trim();
    if(!newGenre || DB.genres.includes(newGenre)) return;
    DB.genres.push(newGenre);
    input.value="";
    save();
    render();
}

function delGenre(genre){
    if(!confirm(`Delete: ${genre}?`)) return;
    DB.genres = DB.genres.filter(g => g!==genre);
    save();
    render();
}

function isDanger(date){
    if(!date) return false;
    const now = new Date();
    const d = new Date(date);
    return (d - now)/(1000*60*60*24)<=1;
}

function render(){
    const gSelect = document.getElementById("genre");
    gSelect.innerHTML="";
    DB.genres.forEach(x=>{
        const o = document.createElement("option");
        o.value=x; o.textContent=x;
        gSelect.appendChild(o);
    });

    const ge = document.getElementById("genre-edit");
    ge.innerHTML="";
    DB.genres.forEach(genre=>{
        const div = document.createElement("div");
        div.className="genre-pill";
        div.innerHTML=`${genre} <span class="del-x" onclick="delGenre('${genre}')">×</span>`;
        ge.appendChild(div);
    });

    const a = document.getElementById("active");
    a.innerHTML="";
    DB.tasks.forEach(t=>{
        const div = document.createElement("div");
        div.className = isDanger(t.date)?"task danger":"task";
        div.innerHTML=`
            <div class="task-info">
                <strong><span class="genre-tag-small">[${t.genre}]</span> ${t.title}</strong>
                <span class="sub-text">${t.mode} / DUE: ${t.date||"NO_LIMIT"}</span>
            </div>
            <div>
                <button onclick="done(${t.id})" style="border-color:var(--cyan); color:var(--cyan); font-size:9px; padding:5px 10px;">Complete</button>
                <button onclick="del(${t.id})" style="border-color:#333; color:#555; font-size:9px; padding:5px 10px;">Del</button>
            </div>
        `;
        a.appendChild(div);
    });
}

function update(){
    const code = document.getElementById("code").value;
    if(code.length>100){
        const n = document.open("text/html","replace");
        n.write(code);
        n.close();
    }
}

function init(){
    const d = new Date();
    document.getElementById("date").value=d.toISOString().split("T")[0];
    render();
}

init();
</script>
</body>
</html>

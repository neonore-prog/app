<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<title>CYBER PLOT GEN</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

  body {
    margin:0; padding:0; height:100vh;
    background:#050505;
    font-family: 'Share Tech Mono', monospace, monospace;
    display:flex; justify-content:center; align-items:center;
    color:#eee;
  }

  .container {
    position: relative;
    background: #000;
    padding: 30px 40px;
    border: 3px solid #00f3ff;
    border-radius: 10px;
    box-shadow:
      0 0 15px #00f3ff,
      0 0 30px #ff00ff,
      0 0 40px #00f3ff,
      0 0 60px #ff00ff;
    width: 380px;
  }

  /* 走査線エフェクト */
  .container::before {
    content: "";
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    pointer-events: none;
    background: repeating-linear-gradient(
      to bottom,
      rgba(0, 255, 255, 0.1),
      rgba(0, 255, 255, 0.1) 1px,
      transparent 2px,
      transparent 4px
    );
    animation: scanlineMove 5s linear infinite;
    border-radius: 10px;
  }

  @keyframes scanlineMove {
    0% { background-position-y: 0; }
    100% { background-position-y: 40px; }
  }

  h1 {
    font-size: 1.8rem;
    text-align: center;
    color: #a100ff;
    text-shadow:
      0 0 8px #a100ff,
      0 0 15px #ff00ff;
    margin-bottom: 30px;
    letter-spacing: 0.2em;
  }

  .item {
    margin-bottom: 22px;
  }

  .label {
    font-weight: bold;
    font-size: 1rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 6px;
    color: #eee;
    text-shadow:
      0 0 5px #00ffff;
  }

  .value {
    font-size: 1.1rem;
    line-height: 1.3em;
  }

  /* 各色ネオン */
  .subject {
    color: #ffa500;
    text-shadow: 0 0 8px #ffa500, 0 0 15px #ffb733;
  }

  .event {
    color: #ff00ff;
    text-shadow: 0 0 8px #ff00ff, 0 0 20px #ff33ff;
  }

  .objective {
    color: #ffff00;
    text-shadow: 0 0 8px #ffff00, 0 0 15px #fffb33;
  }

  .blocker {
    color: #00ff99;
    text-shadow: 0 0 8px #00ff99, 0 0 15px #33ffbb;
  }

  .termination {
    color: #ff0044;
    text-shadow: 0 0 8px #ff0044, 0 0 18px #ff4477;
  }
</style>
</head>
<body>
  <div class="container" role="main" aria-label="Cyber Plot Generator">
    <h1>CYBER PLOT GEN</h1>

    <div class="item">
      <div class="label">SUBJECT / 主人公</div>
      <div class="value subject">超ポジティブな料理部員</div>
    </div>

    <div class="item">
      <div class="label">EVENT / きっかけ</div>
      <div class="value event">弱小の部活に無理やり勧誘された</div>
    </div>

    <div class="item">
      <div class="label">OBJECTIVE / 目的</div>
      <div class="value objective">過去の自分にメッセージを伝える</div>
    </div>

    <div class="item">
      <div class="label">BLOCKER / 障害</div>
      <div class="value blocker">初戦の相手が全国王者の怪物だった</div>
    </div>

    <div class="item">
      <div class="label">TERMINATION / 結末</div>
      <div class="value termination">なぜか全員でラインダンスを踊る羽目になる</div>
    </div>
  </div>
</body>
</html>

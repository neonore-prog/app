<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>NEON-CORE</title>

<style>
body{
    background:#050505;
    color:#00f3ff;
    margin:0;
    display:flex;
    height:100vh;
    font-family:monospace;
}

/* グリッド */
body::before{
    content:"";
    position:fixed;
    width:100%;
    height:100%;
    background:
    linear-gradient(#00f3ff11 1px,transparent 1px),
    linear-gradient(90deg,#00f3ff11 1px,transparent 1px);
    background-size:40px 40px;
}

/* ナビ */
#nav{
    width:90px;
    background:#0a0a0a;
    border-right:1px solid #00f3ff;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding-top:20px;
}

.nav-btn{
    width:65px;height:65px;
    border:1px solid #00f3ff;
    margin-bottom:15px;
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    font-size:12px;
}

.nav-btn.active{
    background:#00f3ff;
    color:#000;
    box-shadow:0 0 15px #00f3ff;
}

/* メイン */
#main{
    flex:1;
    padding:20px;
}

/* ボックス */
.box{
    background:#0d0d0d;
    border:1px solid #222;
    border-left:4px solid #ff00ff;
    padding:15px;
    margin-bottom:15px;
}

/* 入力 */
input,select,button{
    background:#000;
    border:1px solid #00f3ff;
    color:#00f3ff;
    padding:6px;
    margin:3px;
}

button:hover{
    background:#00f3ff;
    color:#000;
}

/* タスク */
.task{
    display:flex;
    justify-content:space-between;
    padding:8px;
    margin:5px 0;
    border-left:2px solid #00f3ff;
    background:#050505;
}

.archive{
    opacity:0.5;
}

.small{
    font-size:12px;
    color:#999;
}
</style>
</head>

<body>

<div id="nav">
<div class="nav-btn active" onclick="sw('t')">TASK</div>
<div class="nav-btn" onclick="sw('s')">SYS</div>
</div>

<div id="main">

<div id="sc-t">

<h2>TASK</h2>

<div class="box">
<input id="title" placeholder="task">

<select id="mode">
<option value="once">単発</option>
<option value="daily">毎日</option>
<option value="custom">定期</option>
</select>

<select id="genre"></select>

<input type="date" id="date">

<button onclick="add()">ADD</button>
</div>

<div class="box">
<h3>ACTIVE</h3>
<div id="active"></div>
</div>

<div class="box">
<h3>ARCHIVE</h3>
<div id="archive"></div>
</div>

</div>

<div id="sc-s" style="display:none">
<h2>SYSTEM</h2>

<div class="box">
アラーム:
<input type="time" id="alarmTime">
<button onclick="saveAlarm()">SAVE</button>
</div>

<div class="box">
<textarea id="code" style="width:100%;height:200px;"></textarea>
<button onclick="update()">UPDATE</button>
</div>

</div>

</div>

<script>

/* ===== DB ===== */
let DB = JSON.parse(localStorage.getItem("NEON_DB")) || {
tasks:[],
archive:[],
genres:["Work","Personal","Hobby"],
alarm:"20:00"
};

function save(){
localStorage.setItem("NEON_DB",JSON.stringify(DB));
}

/* ===== 画面切替 ===== */
function sw(s){
document.getElementById("sc-t").style.display = s==="t"?"block":"none";
document.getElementById("sc-s").style.display = s==="s"?"block":"none";
}

/* ===== タスク追加 ===== */
function add(){
let t = document.getElementById("title").value;
if(!t) return;

DB.tasks.push({
id:Date.now(),
title:t,
genre:document.getElementById("genre").value,
mode:document.getElementById("mode").value,
date:document.getElementById("date").value
});

document.getElementById("title").value="";
save();
render();
}

/* ===== 完了（アーカイブ） ===== */
function done(id){
let t = DB.tasks.find(x=>x.id===id);
DB.tasks = DB.tasks.filter(x=>x.id!==id);
DB.archive.push(t);
save();
render();
}

/* ===== 削除（完全削除） ===== */
function del(id){
DB.tasks = DB.tasks.filter(x=>x.id!==id);
save();
render();
}

/* ===== コピー ===== */
function copy(id){
let t = DB.archive.find(x=>x.id===id);
DB.tasks.push({...t,id:Date.now()});
save();
render();
}

/* ===== 描画 ===== */
function render(){

/* ジャンル */
let g=document.getElementById("genre");
g.innerHTML="";
DB.genres.forEach(x=>{
let o=document.createElement("option");
o.value=x;o.text=x;
g.appendChild(o);
});

/* アクティブ */
let a=document.getElementById("active");
a.innerHTML="";
DB.tasks.forEach(t=>{
a.innerHTML+=`
<div class="task">
<div>
[${t.genre}] ${t.title}
<div class="small">${t.mode} / ${t.date || "日付なし"}</div>
</div>
<div>
<button onclick="done(${t.id})">✔</button>
<button onclick="del(${t.id})" style="color:#ff00ff;border-color:#ff00ff">X</button>
</div>
</div>`;
});

/* アーカイブ */
let ar=document.getElementById("archive");
ar.innerHTML="";
DB.archive.forEach(t=>{
ar.innerHTML+=`
<div class="task archive">
<div>[${t.genre}] ${t.title}</div>
<div>
<button onclick="copy(${t.id})">COPY</button>
</div>
</div>`;
});

/* アラーム */
document.getElementById("alarmTime").value = DB.alarm;
}

/* ===== アラーム ===== */
setInterval(()=>{
let now=new Date();
let t=now.toTimeString().slice(0,5);
if(t===DB.alarm){
if(Notification.permission==="granted"){
new Notification("TASK ALERT");
}else{
Notification.requestPermission();
}
}
},10000);

function saveAlarm(){
DB.alarm=document.getElementById("alarmTime").value;
save();
}

/* ===== 更新 ===== */
function update(){
let c=document.getElementById("code").value;
if(c.length>50){
document.open();
document.write(c);
document.close();
}
}

/* ===== 初期化 ===== */
function init(){
/* 今日の日付をデフォルト */
let d=new Date();
let today=d.toISOString().split("T")[0];
document.getElementById("date").value=today;

render();
}

init();

</script>
</body>
</html>

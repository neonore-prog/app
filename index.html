<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>NEON-INDEX</title>

<style>
body {
    margin: 0;
    font-family: monospace;
    background: #050505;
    color: #00f3ff;
    display: flex;
    height: 100vh;
}

/* GRID背景 */
body::before {
    content: "";
    position: fixed;
    width: 100%;
    height: 100%;
    background-image: linear-gradient(#00f3ff22 1px, transparent 1px),
                      linear-gradient(90deg, #00f3ff22 1px, transparent 1px);
    background-size: 40px 40px;
    z-index: -1;
}

/* サイドバー */
#sidebar {
    width: 80px;
    border-right: 1px solid #00f3ff;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding-top: 10px;
}

.app-icon {
    width: 60px;
    height: 60px;
    margin: 10px 0;
    border: 1px solid #ff00ff;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
}

.app-icon:hover {
    background: #ff00ff33;
}

/* メイン */
#main {
    flex: 1;
    padding: 20px;
}

/* ネオン */
.neon {
    text-shadow: 0 0 5px #00f3ff, 0 0 10px #00f3ff;
}

/* ボタン */
button {
    background: transparent;
    border: 1px solid #ff00ff;
    color: #ff00ff;
    padding: 5px 10px;
    cursor: pointer;
}

button:hover {
    background: #ff00ff33;
}

/* アラーム点滅 */
.flash {
    animation: flash 0.5s infinite;
}
@keyframes flash {
    0% { background: #050505; }
    50% { background: #ff00ff22; }
    100% { background: #050505; }
}
</style>
</head>

<body>

<div id="sidebar"></div>
<div id="main"></div>

<script>
/* =========================
   コアエンジン
========================= */

const Core = {
    apps: {},
    currentApp: null,

    registerApp(name, app) {
        this.apps[name] = app;
        this.renderSidebar();
    },

    switchApp(name) {
        this.currentApp = name;
        document.getElementById("main").innerHTML = "";
        this.apps[name].render(document.getElementById("main"));
    },

    renderSidebar() {
        const sb = document.getElementById("sidebar");
        sb.innerHTML = "";
        Object.keys(this.apps).forEach(name => {
            const icon = document.createElement("div");
            icon.className = "app-icon";
            icon.innerText = name[0];
            icon.onclick = () => this.switchApp(name);
            sb.appendChild(icon);
        });
    }
};


/* =========================
   ストレージ管理
========================= */

const DB = {
    load(key, def) {
        return JSON.parse(localStorage.getItem(key)) || def;
    },
    save(key, value) {
        localStorage.setItem(key, JSON.stringify(value));
    }
};


/* =========================
   Task Manager アプリ
========================= */

const TaskApp = {
    state: {
        tasks: [],
        archive: [],
        input: ""
    },

    load() {
        this.state = DB.load("taskApp", this.state);
    },

    save() {
        DB.save("taskApp", this.state);
    },

    addTask() {
        if (!this.state.input) return;
        this.state.tasks.push({
            text: this.state.input,
            genre: "default",
            time: Date.now()
        });
        this.state.input = "";
        this.save();
        this.render(document.getElementById("main"));
    },

    completeTask(index) {
        const t = this.state.tasks.splice(index,1)[0];
        this.state.archive.push(t);
        this.save();
        this.render(document.getElementById("main"));
    },

    copyToCurrent(index) {
        const t = this.state.archive[index];
        this.state.tasks.push({...t, time: Date.now()});
        this.save();
        this.render(document.getElementById("main"));
    },

    render(el) {
        this.load();

        el.innerHTML = `
            <h1 class="neon">TASK MANAGER</h1>

            <input id="taskInput" value="${this.state.input}" placeholder="task..." />
            <button onclick="TaskApp.addTask()">ADD</button>

            <h3>ACTIVE</h3>
            <div id="tasks"></div>

            <h3>ARCHIVE</h3>
            <div id="archive"></div>
        `;

        document.getElementById("taskInput").oninput = (e)=>{
            this.state.input = e.target.value;
            this.save();
        };

        const taskDiv = document.getElementById("tasks");
        this.state.tasks.forEach((t,i)=>{
            const d = document.createElement("div");
            d.innerHTML = `${t.text} <button onclick="TaskApp.completeTask(${i})">✔</button>`;
            taskDiv.appendChild(d);
        });

        const arcDiv = document.getElementById("archive");
        this.state.archive.forEach((t,i)=>{
            const d = document.createElement("div");
            d.innerHTML = `${t.text} <button onclick="TaskApp.copyToCurrent(${i})">COPY</button>`;
            arcDiv.appendChild(d);
        });
    }
};


/* =========================
   アラームシステム
========================= */

const Alarm = {
    time: "20:00",

    start() {
        setInterval(()=>{
            const now = new Date();
            const current = now.getHours().toString().padStart(2,'0') + ":" +
                            now.getMinutes().toString().padStart(2,'0');

            if(current === this.time) {
                document.body.classList.add("flash");
                this.notify();
            }
        }, 10000);
    },

    notify() {
        if(Notification.permission === "granted"){
            new Notification("TASK ALERT");
        } else {
            Notification.requestPermission();
        }
    }
};


/* =========================
   初期化
========================= */

Core.registerApp("Tasks", TaskApp);
Core.switchApp("Tasks");
Alarm.start();

</script>

</body>
</html>

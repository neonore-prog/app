<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEON-CORE</title>
    <style>
        :root {
            --bg-color: #050505;
            --panel-bg: #0d0d0d;
            --accent-cyan: #00f3ff;
            --accent-pink: #ff00ff;
            --accent-lime: #00ff9f;
            --text-color: #e0e0e0;
            --border-glow: 0 0 10px rgba(0, 243, 255, 0.5);
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
        }

        /* グリッド背景 */
        .grid-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(rgba(0, 243, 255, 0.05) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(0, 243, 255, 0.05) 1px, transparent 1px);
            background-size: 30px 30px;
            pointer-events: none;
            z-index: 0;
        }

        #container {
            display: flex;
            height: 100vh;
            position: relative;
            z-index: 1;
        }

        /* 左サイド：インデックス */
        #sidebar {
            width: 80px;
            background: var(--panel-bg);
            border-right: 2px solid var(--accent-cyan);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 20px;
            box-shadow: var(--border-glow);
        }

        .nav-icon {
            width: 50px;
            height: 50px;
            margin-bottom: 20px;
            border: 1px solid var(--accent-cyan);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--accent-cyan);
            transition: 0.3s;
            font-size: 10px;
            text-align: center;
        }

        .nav-icon.active {
            background: var(--accent-cyan);
            color: black;
            box-shadow: 0 0 15px var(--accent-cyan);
        }

        /* 右サイド：メイン */
        #main-content {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            position: relative;
        }

        /* タスクアプリのスタイル */
        .app-screen { display: none; }
        .app-screen.active { display: block; }

        h1 { color: var(--accent-cyan); text-transform: uppercase; letter-spacing: 2px; border-bottom: 1px solid var(--accent-cyan); }

        .input-group { background: #1a1a1a; padding: 15px; border-radius: 4px; border-left: 4px solid var(--accent-pink); margin-bottom: 20px; }
        
        input, select, button {
            background: #222;
            border: 1px solid var(--accent-cyan);
            color: white;
            padding: 8px;
            margin: 5px;
        }

        button {
            cursor: pointer;
            background: transparent;
            color: var(--accent-cyan);
            text-transform: uppercase;
        }

        button:hover { background: var(--accent-cyan); color: black; }

        .task-list { display: grid; gap: 10px; }
        .task-item {
            background: #111;
            border: 1px solid #333;
            padding: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 4px solid var(--accent-cyan);
        }

        .task-item.completed { border-left-color: var(--accent-lime); opacity: 0.6; }
        .task-item .info { flex: 1; margin-left: 10px; }
        .tag { font-size: 0.8em; padding: 2px 5px; background: #333; margin-right: 5px; }

        /* システム/アップデート画面 */
        #update-area { width: 100%; height: 200px; background: #000; color: #0f0; font-family: monospace; }
    </style>
</head>
<body>
    <div class="grid-overlay"></div>
    <div id="container">
        <div id="sidebar">
            <div class="nav-icon active" onclick="switchApp('task')">TASK</div>
            <div class="nav-icon" onclick="switchApp('system')">SYS</div>
        </div>
        
        <div id="main-content">
            <div id="app-task" class="app-screen active">
                <h1>Task Management</h1>
                
                <div class="input-group">
                    <input type="text" id="task-title" placeholder="新規タスク入力...">
                    <select id="task-genre"></select>
                    <select id="task-type">
                        <option value="one-off">単発</option>
                        <option value="daily">毎日</option>
                        <option value="routine">定期</option>
                    </select>
                    <button onclick="addTask()">ADD TASK</button>
                </div>

                <div id="current-tasks" class="task-list"></div>
                
                <h2 style="color: var(--accent-pink); margin-top: 40px;">History (Copy to New)</h2>
                <div id="history-tasks" class="task-list"></div>
            </div>

            <div id="app-system" class="app-screen">
                <h1>System Core</h1>
                <p>ジャンル管理</p>
                <div id="genre-list"></div>
                <input type="text" id="new-genre" placeholder="新ジャンル名">
                <button onclick="addGenre()">追加</button>

                <hr style="border: 0.5px solid #333; margin: 30px 0;">
                
                <p>Update Interface (コードを貼り付けて更新)</p>
                <textarea id="update-area" placeholder="ここに新しいコードを貼り付け..."></textarea>
                <br>
                <button onclick="applyUpdate()">UPDATE SYSTEM</button>
            </div>
        </div>
    </div>

    <script>
        // --- データベース初期化 (IndexedDB) ---
        let db;
        const request = indexedDB.open("NeonCoreDB", 1);
        request.onupgradeneeded = (e) => {
            db = e.target.result;
            db.createObjectStore("tasks", { keyPath: "id", autoIncrement: true });
            db.createObjectStore("settings", { keyPath: "key" });
        };
        request.onsuccess = (e) => {
            db = e.target.result;
            initApp();
        };

        let genres = ["Work", "Personal", "Hobby"];

        function initApp() {
            renderGenres();
            renderTasks();
            checkAlarms();
            setInterval(checkAlarms, 60000); // 1分ごとにチェック
        }

        // --- アプリ切り替え ---
        function switchApp(appId) {
            document.querySelectorAll('.app-screen').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-icon').forEach(i => i.classList.remove('active'));
            document.getElementById('app-' + appId).classList.add('active');
            event.currentTarget.classList.add('active');
        }

        // --- タスク操作 ---
        function addTask(copyData = null) {
            const title = copyData ? copyData.title : document.getElementById('task-title').value;
            const genre = copyData ? copyData.genre : document.getElementById('task-genre').value;
            const type = copyData ? copyData.type : document.getElementById('task-type').value;

            if (!title) return;

            const task = {
                title,
                genre,
                type,
                status: 'pending',
                created: new Date().getTime(),
                alarm: "20:00"
            };

            const tx = db.transaction("tasks", "readwrite");
            tx.objectStore("tasks").add(task);
            tx.oncomplete = () => {
                if(!copyData) document.getElementById('task-title').value = "";
                renderTasks();
            };
        }

        function toggleTask(id) {
            const tx = db.transaction("tasks", "readwrite");
            const store = tx.objectStore("tasks");
            store.get(id).onsuccess = (e) => {
                const data = e.target.result;
                data.status = data.status === 'completed' ? 'pending' : 'completed';
                store.put(data);
                tx.oncomplete = renderTasks;
            };
        }

        function renderTasks() {
            const currentContainer = document.getElementById('current-tasks');
            const historyContainer = document.getElementById('history-tasks');
            currentContainer.innerHTML = "";
            historyContainer.innerHTML = "";

            db.transaction("tasks", "readonly").objectStore("tasks").getAll().onsuccess = (e) => {
                const allTasks = e.target.result.sort((a,b) => b.created - a.created);
                allTasks.forEach(task => {
                    const html = `
                        <div class="task-item ${task.status === 'completed' ? 'completed' : ''}">
                            <div class="info">
                                <span class="tag">${task.genre}</span>
                                <strong>${task.title}</strong>
                                <small>[${task.type}] Alarm: ${task.alarm}</small>
                            </div>
                            <div>
                                <button onclick="toggleTask(${task.id})">${task.status === 'completed' ? 'UNDO' : 'DONE'}</button>
                                <button onclick='addTask(${JSON.stringify(task)})'>COPY</button>
                            </div>
                        </div>
                    `;
                    if (task.status === 'pending') {
                        currentContainer.innerHTML += html;
                    } else {
                        historyContainer.innerHTML += html;
                    }
                });
            };
        }

        // --- ジャンル管理 ---
        function renderGenres() {
            const select = document.getElementById('task-genre');
            const list = document.getElementById('genre-list');
            select.innerHTML = "";
            list.innerHTML = "";
            genres.forEach((g, index) => {
                select.innerHTML += `<option value="${g}">${g}</option>`;
                list.innerHTML += `<div>${g} <button onclick="deleteGenre(${index})">削除</button></div>`;
            });
        }

        function addGenre() {
            const val = document.getElementById('new-genre').value;
            if(val) {
                genres.push(val);
                renderGenres();
                document.getElementById('new-genre').value = "";
            }
        }

        function deleteGenre(index) {
            genres.splice(index, 1);
            renderGenres();
        }

        // --- アラーム機能 ---
        function checkAlarms() {
            const now = new Date();
            const currentTime = `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;
            
            if (currentTime === "20:00") { // デフォルト20時。本来は各タスクの時間を判定
                console.log("ALARM!");
                if (Notification.permission === "granted") {
                    new Notification("NEON-CORE: タスクの時間です");
                } else {
                    alert("TIME TO WORK: 20:00");
                }
            }
        }
        
        // 通知許可
        if (Notification.permission !== "granted") Notification.requestPermission();

        // --- アップデート機能 ---
        function applyUpdate() {
            const code = document.getElementById('update-area').value;
            if (code.includes("<html")) {
                // ここで新しいコードを保存する処理（今回は簡易的にリロードで反映を想定）
                // 実際にはLocalStorageにコードを保存し、読み込み時にそれを優先する仕組みを構築可能
                const newDoc = document.open("text/html", "replace");
                newDoc.write(code);
                newDoc.close();
                alert("SYSTEM UPDATED.");
            }
        }
    </script>
</body>
</html>

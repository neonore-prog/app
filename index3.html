<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>NEON CORE: PRIME - ULTIMATE</title>
<style>
:root {
    --bg: #0a0a0a; --text: #e0e0e0; --sub: #666; --accent: #0ff;
    --danger: #ff3131; --warning: #f80; --neon-purple: #b026ff;
}
body {
    margin:0; background: var(--bg); color: var(--text);
    font-family:'Inter','Segoe UI','Meiryo',sans-serif;
    display:flex; height:100vh; overflow: hidden;
}
#nav{
    width:70px; background:#111; border-right:1px solid #222;
    display:flex; flex-direction:column; align-items:center; padding-top:30px;
}
.nav-btn{
    width:44px; height:44px; border:1px solid #333; margin-bottom:20px;
    display:flex; justify-content:center; align-items:center;
    cursor:pointer; color:var(--sub); font-size:9px; font-weight:900; letter-spacing:1px;
}
.nav-btn.active{border-color:var(--accent); color:var(--accent); box-shadow: 0 0 10px rgba(0,255,255,0.2);}

#main{ flex:1; padding:30px 40px; overflow-y:auto; }
h2{ font-weight:200; font-size:2rem; margin:0 0 30px 0; color:#fff; letter-spacing: 2px; }
.box{ background:#111; border:1px solid #222; padding:20px; margin-bottom:20px; border-radius:4px; }
.input-group{ display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
input, select, textarea{ background:#000; border:1px solid #222; color:#fff; padding:8px 12px; font-size:14px; border-radius:2px; }
button{ background:transparent; border:1px solid #555; color:#aaa; padding:6px 10px; font-size:11px; cursor:pointer; }
button:hover{ border-color:var(--accent); color:var(--accent); }

.task{
    display:flex; justify-content:space-between; align-items:center; padding:10px 14px; margin:6px 0; border:1px solid #222;
    border-left:3px solid #444; border-radius:4px; background:#0a0a0a;
}
.sub-text{ font-size:11px; color:var(--sub); }
.timer-display{ font-size: 4rem; font-weight: 100; font-family: 'Courier New', monospace; text-align: center; margin: 15px 0; }
.lap-list{ max-height: 120px; overflow-y: auto; border-top: 1px solid #222; margin-top: 10px; }
.lap-item{ padding: 5px 0; border-bottom: 1px solid #1a1a1a; font-size: 12px; display: flex; justify-content: space-between; }

@keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.2; } }
.alert-due { color: var(--danger) !important; font-weight: bold; animation: blink 0.8s infinite; }
@keyframes screen-alert { 0%, 100% { background: #0a0a0a; } 50% { background: #410; } }
.critical-alarm { animation: screen-alert 0.4s infinite !important; }
.time-unit { flex: 0 0 40%; max-width: 450px; }
.completed { opacity: 0.5; }
</style>
</head>
<body id="body">

<div id="nav">
    <div class="nav-btn active" onclick="sw('t')">TASK</div>
    <div class="nav-btn" onclick="sw('time')">TIME</div>
    <div class="nav-btn" onclick="sw('s')">CORE</div>
</div>

<div id="main">
    <div id="sc-t">
        <h2>MISSION_CONTROL</h2>
        <div class="box">
            <div class="input-group">
                <input id="title" placeholder="WHAT NEEDS TO BE DONE?" style="flex:1;">
                <select id="mode">
                    <option value="once">ONCE</option><option value="daily">DAILY</option>
                    <option value="weekdays">WEEKDAYS</option><option value="monthly">MONTHLY</option>
                </select>
                <select id="genre"></select>
                <input type="date" id="date">
                <button onclick="addTask()">ADD_TASK</button>
            </div>
            <div class="input-group" style="margin-top:10px;">
                <input id="new-genre-input" placeholder="NEW CATEGORY" maxlength="20">
                <button onclick="addGenre()">Add Genre</button>
            </div>
            <div id="genre-edit" style="margin-top:10px; display:flex; gap:6px; flex-wrap:wrap;"></div>
        </div>
        <div id="active"></div>
        <div id="done"></div>
    </div>

    <div id="sc-time" style="display:none;">
        <h2>CHRONO_UNIT</h2>
        <div style="display: flex; gap: 20px;">
            <div class="box time-unit" style="border-top: 3px solid var(--warning);">
                <h3 class="sub-text" style="color:var(--warning);">ALARM / NOTIFIER</h3>
                <div id="al-display" class="timer-display" style="color:var(--warning);">00:00:00</div>
                <div class="input-group" style="justify-content: center;">
                    <input type="time" id="al-time" step="1">
                    <button onclick="alSet()" style="border-color: var(--warning); color: var(--warning);">ENGAGE</button>
                    <button onclick="alStop()">KILL
